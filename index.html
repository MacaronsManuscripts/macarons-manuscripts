<!DOCTYPE html>
<html>
<head>
<title>Macarons Manuscripts</title>

<style>

body {
    margin: 0;
    font-family: Georgia, serif;
    background: #fff7f3;
    color: #5b3b4f;
}

.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background:
    linear-gradient(rgba(255,247,243,0.85), rgba(255,247,243,0.95)),
    url('https://images.unsplash.com/photo-1512820790803-83ca734da794');
    background-size: cover;
    padding: 40px;
}

.container {
    max-width: 800px;
}

h1 {
    font-size: 60px;
    margin-bottom: 10px;
}

h2 {
    font-size: 30px;
}

p {
    font-size: 20px;
    line-height: 1.6;
}

button {
    background: #e8a7bd;
    border: none;
    padding: 18px 40px;
    border-radius: 40px;
    font-size: 18px;
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

.sparkle {
    font-size: 35px;
    animation: float 3s infinite;
}

@keyframes float {
    50% {
        transform: translateY(-20px);
    }
}

</style>

</head>

<body>

<section class="hero">

<div class="container">

<div class="sparkle">✨ 📚 ✨</div>

<h1>Macarons Manuscripts</h1>

<h2>Where Bookworms Buy Cute Things</h2>

<p>
A magical bookish boutique filled with handcrafted bookmarks,
cosy reading gifts, whimsical stationery, and treasures inspired
by the stories you love.
</p>

<p>
🐉 Meet Pip Inkwing<br>
Keeper of the Manuscripts and official bookmark inspector.
</p>

<button>
Shop the Collection
</button>

<div class="sparkle">✨ 🐉 ✨</div>

</div>

</section>

</body>
</html>
